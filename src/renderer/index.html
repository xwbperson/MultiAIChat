<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https: file: data:; connect-src 'none'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'">
  <title>AI Workspace</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div id="app">
    <div id="titlebar">
      <div class="app-title">AI Workspace</div>
      <div class="titlebar-drag"></div>
      <div class="window-controls">
        <button id="btn-minimize" class="win-btn" type="button" aria-label="最小化">─</button>
        <button id="btn-maximize" class="win-btn" type="button" aria-label="最大化">□</button>
        <button id="btn-close" class="win-btn close" type="button" aria-label="关闭">✕</button>
      </div>
    </div>
    <div id="sidebar">
      <div id="site-list"></div>
      <div id="sidebar-bottom">
        <button id="btn-settings" class="sidebar-btn" type="button" title="设置" aria-label="打开设置">⚙</button>
      </div>
    </div>
    <div id="main">
      <div id="toolbar"></div>
      <div id="view-container"></div>
    </div>
    <div id="statusbar"></div>
  </div>
  <script src="dialogs.js"></script>
  <script src="sidebar.js"></script>
  <script src="toolbar.js"></script>
  <script src="settings.js"></script>
  <script src="site-manager.js"></script>
  <script src="app.js"></script>
</body>
</html>
